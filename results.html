<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Foogle</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="results-header">
    <a href="index.html" class="results-logo" aria-label="Foogle">
      <span class="logo-f">F</span><span class="logo-o1">o</span><span class="logo-o2">o</span><span class="logo-g">g</span><span class="logo-l">l</span><span class="logo-e">e</span>
    </a>

    <form class="results-search-wrap" id="results-form">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="text"
        id="results-search-input"
        autocomplete="off"
        spellcheck="false"
        placeholder="Cerca con Foogle..."
      />
    </form>
  </header>

  <!-- RISULTATI -->
  <main class="results-main">
    <div class="results-count" id="results-count"></div>
    <div id="results-list"></div>
  </main>

  <script src="js/templates.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q') || '';

    document.getElementById('results-search-input').value = q;
    document.getElementById('page-title').textContent = q + ' - Foogle';

    // Genera o recupera risultati
    let results;
    const cached = localStorage.getItem('foogle_results');
    const cachedQ = localStorage.getItem('foogle_results_q');
    if (cached && cachedQ === q) {
      results = JSON.parse(cached);
    } else {
      results = getRandomResults(q);
      localStorage.setItem('foogle_results', JSON.stringify(results));
      localStorage.setItem('foogle_results_q', q);
    }

    // Intestazione conteggio
    const count = document.getElementById('results-count');
    const nRis = results.length;
    count.textContent = `Circa ${(nRis * 1_230_000).toLocaleString('it-IT')} risultati (${(Math.random() * 0.4 + 0.3).toFixed(2).replace('.', ',')} secondi)`;

    // Icona sito
    function getFavicon(sito) {
      return sito.charAt(0).toUpperCase();
    }

    // Render risultati
    const list = document.getElementById('results-list');
    results.forEach(r => {
      const item = document.createElement('div');
      item.className = 'result-item';
      item.innerHTML = `
        <div class="result-site">
          <div class="result-site-favicon">${getFavicon(r.sito)}</div>
          <div>
            <div class="result-site-name">${r.sito}</div>
            <div class="result-url">${r.url}</div>
          </div>
        </div>
        <a class="result-title" href="page.html?t=${r.id}&q=${encodeURIComponent(q)}">${r.titolo}</a>
        <div class="result-snippet">${r.snippet}</div>
      `;
      list.appendChild(item);
    });

    // Nuova ricerca dall'header
    document.getElementById('results-form').addEventListener('submit', e => {
      e.preventDefault();
      const newQ = document.getElementById('results-search-input').value.trim();
      if (!newQ) return;
      localStorage.removeItem('foogle_results');
      localStorage.removeItem('foogle_results_q');
      window.location.href = 'results.html?q=' + encodeURIComponent(newQ);
    });
  </script>
</body>
</html>
