<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Foogle</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="results-page">

  <!-- ===== HEADER ===== -->
  <header>
    <div class="results-header">
      <!-- Logo -->
      <a href="index.html" class="results-logo" aria-label="Foogle">
        <span class="logo-f">F</span><span class="logo-o1">o</span><span class="logo-o2">o</span><span class="logo-g">g</span><span class="logo-l">l</span><span class="logo-e">e</span>
      </a>

      <!-- Barra di ricerca -->
      <form id="results-form" style="display:flex;align-items:center;flex:1;max-width:601px;gap:0;">
        <div class="results-bar-outer" style="flex:1;">
          <div class="icon-search-left">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </div>
          <input
            type="text"
            id="results-search-input"
            spellcheck="false"
            autocomplete="off"
          />
          <div class="bar-divider"></div>
          <!-- Icona foto nella barra -->
          <label class="icon-btn" for="results-photo-input" title="Aggiungi foto">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </label>
          <input type="file" id="results-photo-input" accept="image/*" class="sr-only" />
        </div>
        <button class="btn-search-blue" type="submit" aria-label="Cerca">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </form>
    </div>

    <!-- Tab navigazione -->
    <nav class="results-tabs">
      <a class="results-tab active" href="#">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Tutti
      </a>
      <a class="results-tab" href="#">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Immagini
      </a>
      <a class="results-tab" href="#">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2z"/><path d="M4 6h.01"/><path d="M4 10h.01"/><path d="M4 14h.01"/><path d="M4 18h.01"/></svg>
        Notizie
      </a>
      <a class="results-tab" href="#">Video</a>
      <a class="results-tab" href="#">Mappe</a>
      <a class="results-tab" href="#">Libri</a>
      <div class="results-tab-divider"></div>
      <a class="results-tab" href="#">Strumenti</a>
    </nav>
  </header>

  <!-- ===== RISULTATI ===== -->
  <main class="results-main">
    <div class="results-count" id="results-count"></div>
    <div id="results-list"></div>
  </main>

  <script src="js/nomi.js"></script>
  <script src="js/templates.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const q    = params.get('q') || '';
    const page = Math.max(1, Math.min(2, parseInt(params.get('page') || '1', 10)));

    document.getElementById('results-search-input').value = q;
    document.getElementById('page-title').textContent = q + ' - Foogle';

    const list         = document.getElementById('results-list');
    const countEl      = document.getElementById('results-count');
    const faviconColors = {
      forbes: '#cc0000', sole24ore: '#003399', bloomberg: '#000',
      natgeo: '#FFCC00', guinness: '#1a1a2e', corriere: '#b30000',
      gamberorosso: '#8B0000', medico: '#1565c0', universita: '#5c2d91', oms: '#009bde'
    };

    // ── Gestione foto nella barra risultati ──
    const rpInput = document.getElementById('results-photo-input');
    rpInput.addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        localStorage.setItem('foogle_photo', e.target.result);
        localStorage.setItem('foogle_photo_name', file.name);
      };
      reader.readAsDataURL(file);
    });

    // ── BRANCH: nome in lista → fake, altrimenti → Google API ──
    if (q && isNomeFamoso(q)) {
      renderFake(q);
    } else if (q) {
      renderGoogle(q);
    }

    // ── Risultati FAKE ──
    function renderFake(q) {
      let allResults;
      const cached  = localStorage.getItem('foogle_results');
      const cachedQ = localStorage.getItem('foogle_results_q');
      if (cached && cachedQ === q) {
        allResults = JSON.parse(cached);
      } else {
        allResults = getRandomResults(q);
        localStorage.setItem('foogle_results', JSON.stringify(allResults));
        localStorage.setItem('foogle_results_q', q);
      }

      const PER_PAGE = 7;
      const results  = allResults.slice((page - 1) * PER_PAGE, page * PER_PAGE);
      const totalPages = Math.ceil(allResults.length / PER_PAGE);

      countEl.textContent =
        `Circa ${(allResults.length * 1_340_000).toLocaleString('it-IT')} risultati` +
        ` (${(Math.random() * 0.4 + 0.28).toFixed(2).replace('.', ',')} secondi)`;

      results.forEach(r => {
        const bg = faviconColors[r.tema] || '#5f6368';
        const letter = r.sito.charAt(0).toUpperCase();
        const d = new Date();
        d.setDate(d.getDate() - Math.floor(Math.random() * 180));
        const dataStr = d.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });

        const item = document.createElement('div');
        item.className = 'result-item';
        item.innerHTML = `
          <div class="result-site-row">
            <div class="result-favicon" style="background:${bg};color:#fff;">${letter}</div>
            <div class="result-site-info">
              <span class="result-site-name">${r.sito}</span>
              <span class="result-url-breadcrumb">${r.url}</span>
            </div>
          </div>
          <a class="result-title-link" href="page.html?t=${r.id}&q=${encodeURIComponent(q)}">${r.titolo}</a>
          <div class="result-snippet"><span class="date">${dataStr} — </span>${r.snippet}</div>
        `;
        list.appendChild(item);
      });

      // ── Paginazione ──
      const pager = document.createElement('div');
      pager.className = 'results-pagination';
      const baseUrl = `results.html?q=${encodeURIComponent(q)}`;
      if (page > 1) {
        pager.innerHTML += `<a class="page-btn" href="${baseUrl}&page=${page - 1}">← Precedente</a>`;
      }
      for (let p = 1; p <= totalPages; p++) {
        pager.innerHTML += `<a class="page-btn${p === page ? ' active' : ''}" href="${baseUrl}&page=${p}">${p}</a>`;
      }
      if (page < totalPages) {
        pager.innerHTML += `<a class="page-btn" href="${baseUrl}&page=${page + 1}">Successiva →</a>`;
      }
      list.appendChild(pager);
    }

    // ── Risultati REALI da Google API ──
    async function renderGoogle(q) {
      countEl.textContent = 'Ricerca in corso...';

      try {
        const res  = await fetch('/api/search?q=' + encodeURIComponent(q));
        const data = await res.json();

        if (!res.ok || !data.items) {
          countEl.textContent = data.error || 'Nessun risultato trovato.';
          return;
        }

        const info = data.searchInformation || {};
        countEl.textContent =
          `Circa ${info.formattedTotalResults || data.items.length} risultati` +
          ` (${(info.formattedSearchTime || '0,40').replace('.', ',')} secondi)`;

        data.items.forEach(item => {
          const domain = item.displayLink || '';
          const letter = domain.charAt(0).toUpperCase();

          // Prova a prendere favicon da Google
          const faviconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;

          const div = document.createElement('div');
          div.className = 'result-item';
          div.innerHTML = `
            <div class="result-site-row">
              <div class="result-favicon" style="background:#3c4043;overflow:hidden;padding:0;">
                <img src="${faviconUrl}" width="18" height="18"
                     style="display:block;" loading="lazy"
                     onerror="this.style.display='none';this.parentNode.textContent='${letter}'"/>
              </div>
              <div class="result-site-info">
                <span class="result-site-name">${domain}</span>
                <span class="result-url-breadcrumb">${item.link}</span>
              </div>
            </div>
            <a class="result-title-link" href="${item.link}" target="_blank" rel="noopener">${item.title}</a>
            <div class="result-snippet">${item.snippet || ''}</div>
          `;
          list.appendChild(div);
        });

      } catch (err) {
        countEl.textContent = 'Errore di connessione. Riprova.';
      }
    }

    // Nuova ricerca
    document.getElementById('results-form').addEventListener('submit', e => {
      e.preventDefault();
      const newQ = document.getElementById('results-search-input').value.trim();
      if (!newQ) return;
      localStorage.removeItem('foogle_results');
      localStorage.removeItem('foogle_results_q');
      window.location.href = 'results.html?q=' + encodeURIComponent(newQ);
    });
  </script>
</body>
</html>
