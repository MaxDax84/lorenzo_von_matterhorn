<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foogle</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }
  </style>
</head>
<body class="home-body">

  <!-- Top bar -->
  <div class="home-top-bar">
    <a href="#">Gmail</a>
    <a href="#">Immagini</a>
  </div>

  <!-- Center -->
  <div class="home-center">
    <div class="home-logo" aria-label="Foogle">
      <span class="logo-f">F</span><span class="logo-o1">o</span><span class="logo-o2">o</span><span class="logo-g">g</span><span class="logo-l">l</span><span class="logo-e">e</span>
    </div>

    <div class="home-search-section">
      <form id="search-form" autocomplete="off">
        <div class="search-bar-outer" id="search-bar">
          <!-- Icona lente sinistra -->
          <div class="icon-search-left">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </div>

          <input
            type="text"
            id="search-input"
            name="q"
            placeholder="Cerca una persona..."
            spellcheck="false"
          />

          <!-- Tasto foto -->
          <label class="icon-photo-btn" for="photo-input" title="Aggiungi una foto">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <span id="photo-btn-label">Foto</span>
          </label>
          <input type="file" id="photo-input" accept="image/*" class="sr-only" />
        </div>

        <!-- Anteprima foto -->
        <div class="photo-strip" id="photo-strip">
          <img id="photo-thumb" src="" alt="" />
          <span id="photo-name">foto caricata</span>
          <button type="button" id="remove-photo" title="Rimuovi">✕</button>
        </div>

        <div class="home-buttons">
          <button type="submit" class="btn-google">Cerca con Foogle</button>
          <button type="button" class="btn-google" id="btn-lucky">Mi sento fortunato</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer class="home-footer">
    <div class="home-footer-row border-bottom">
      <span>Italia</span>
    </div>
    <div class="home-footer-row">
      <a href="#">Pubblicità</a>
      <a href="#">Attività commerciali</a>
      <a href="#">Come funziona Foogle</a>
      <div class="right">
        <a href="#">Privacy</a>
        <a href="#">Condizioni</a>
        <a href="#">Impostazioni</a>
      </div>
    </div>
  </footer>

  <script src="js/templates.js"></script>
  <script>
    const form        = document.getElementById('search-form');
    const input       = document.getElementById('search-input');
    const photoInput  = document.getElementById('photo-input');
    const strip       = document.getElementById('photo-strip');
    const thumb       = document.getElementById('photo-thumb');
    const photoName   = document.getElementById('photo-name');
    const removeBtn   = document.getElementById('remove-photo');
    const btnLabel    = document.getElementById('photo-btn-label');

    // Ripristina foto salvata
    const saved = localStorage.getItem('foogle_photo');
    const savedName = localStorage.getItem('foogle_photo_name');
    if (saved) {
      thumb.src = saved;
      photoName.textContent = savedName || 'foto caricata';
      strip.classList.add('visible');
      btnLabel.textContent = 'Cambia';
    }

    // Upload foto
    photoInput.addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        localStorage.setItem('foogle_photo', e.target.result);
        localStorage.setItem('foogle_photo_name', file.name);
        thumb.src = e.target.result;
        photoName.textContent = file.name;
        strip.classList.add('visible');
        btnLabel.textContent = 'Cambia';
      };
      reader.readAsDataURL(file);
    });

    // Rimuovi foto
    removeBtn.addEventListener('click', function () {
      localStorage.removeItem('foogle_photo');
      localStorage.removeItem('foogle_photo_name');
      strip.classList.remove('visible');
      thumb.src = '';
      photoInput.value = '';
      btnLabel.textContent = 'Foto';
    });

    // Ricerca
    function doSearch() {
      const q = input.value.trim();
      if (!q) { input.focus(); return; }
      localStorage.removeItem('foogle_results');
      localStorage.removeItem('foogle_results_q');
      window.location.href = 'results.html?q=' + encodeURIComponent(q);
    }

    form.addEventListener('submit', e => { e.preventDefault(); doSearch(); });

    // Mi sento fortunato → prima pagina direttamente
    document.getElementById('btn-lucky').addEventListener('click', function () {
      const q = input.value.trim();
      if (!q) { input.focus(); return; }
      const results = getRandomResults(q);
      localStorage.setItem('foogle_results', JSON.stringify(results));
      localStorage.setItem('foogle_results_q', q);
      window.location.href = 'page.html?t=' + results[0].id + '&q=' + encodeURIComponent(q);
    });
  </script>
</body>
</html>
