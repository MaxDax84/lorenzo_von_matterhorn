<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foogle</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="home-body">

  <!-- ===== TOP BAR ===== -->
  <div class="home-top-bar">
    <!-- Sinistra -->
    <div class="top-left">
      <a href="#">Chi siamo</a>
      <a href="#">Foogle Store</a>
    </div>
    <!-- Destra -->
    <div class="top-right">
      <a href="#">Gmail</a>
      <a href="#">Immagini</a>

      <!-- Icona App (griglia 3×3) -->
      <button class="top-icon-btn" title="App Google" aria-label="App Google">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="5"  cy="5"  r="1.8"/>
          <circle cx="12" cy="5"  r="1.8"/>
          <circle cx="19" cy="5"  r="1.8"/>
          <circle cx="5"  cy="12" r="1.8"/>
          <circle cx="12" cy="12" r="1.8"/>
          <circle cx="19" cy="12" r="1.8"/>
          <circle cx="5"  cy="19" r="1.8"/>
          <circle cx="12" cy="19" r="1.8"/>
          <circle cx="19" cy="19" r="1.8"/>
        </svg>
      </button>

      <!-- Avatar -->
      <div class="top-avatar" title="Account Google">M</div>
    </div>
  </div>

  <!-- ===== CENTRO ===== -->
  <div class="home-center">

    <!-- Logo -->
    <div class="home-logo" aria-label="Foogle">
      <span class="logo-f">F</span><span class="logo-o1">o</span><span class="logo-o2">o</span><span class="logo-g">g</span><span class="logo-l">l</span><span class="logo-e">e</span>
    </div>

    <!-- Form ricerca -->
    <div class="home-search-section">
      <form id="search-form" autocomplete="off">

        <!-- Barra di ricerca -->
        <div class="search-bar-outer" id="search-bar">

          <!-- Lente sinistra -->
          <div class="sb-icon sb-icon-left">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </div>

          <!-- Input -->
          <input
            type="text"
            id="search-input"
            name="q"
            placeholder="Cerca una persona..."
            spellcheck="false"
          />

          <!-- Icone destra: + (foto) | microfono | lente colore -->
          <div class="sb-right-icons">

            <!-- + Foto -->
            <label class="sb-icon sb-icon-plus" for="photo-input" title="Aggiungi foto">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </label>
            <input type="file" id="photo-input" accept="image/*" class="sr-only" />

            <div class="sb-divider"></div>

            <!-- Microfono -->
            <button type="button" class="sb-icon" title="Ricerca vocale" aria-label="Ricerca vocale">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="2" width="6" height="11" rx="3"/>
                <path d="M5 10a7 7 0 0 0 14 0"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8"  y1="23" x2="16" y2="23"/>
              </svg>
            </button>

            <div class="sb-divider"></div>

            <!-- Lente colorata (Google Lens style) -->
            <button type="submit" class="sb-icon sb-lens" title="Cerca con Foogle" aria-label="Cerca">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7" stroke="#4285F4"/>
                <line  x1="20" y1="20" x2="15.5" y2="15.5" stroke="#EA4335" stroke-width="2.5"/>
              </svg>
            </button>

          </div><!-- /sb-right-icons -->
        </div><!-- /search-bar-outer -->

        <!-- Anteprima foto caricata -->
        <div class="photo-strip" id="photo-strip">
          <img id="photo-thumb" src="" alt="" />
          <span id="photo-name">foto caricata</span>
          <button type="button" id="remove-photo" title="Rimuovi">✕</button>
        </div>

        <!-- Pulsanti -->
        <div class="home-buttons">
          <button type="submit" class="btn-google">Cerca con Foogle</button>
          <button type="button" class="btn-google" id="btn-lucky">Mi sento fortunato</button>
        </div>

      </form>
    </div><!-- /home-search-section -->
  </div><!-- /home-center -->

  <!-- ===== FOOTER ===== -->
  <footer class="home-footer">
    <!-- Riga paese -->
    <div class="home-footer-country">
      <span>Italia</span>
    </div>
    <!-- Riga link -->
    <div class="home-footer-links">
      <div class="footer-left">
        <a href="#">Pubblicità</a>
        <a href="#">Soluzioni aziendali</a>
        <a href="#">Come funziona la Ricerca</a>
      </div>
      <div class="footer-center">
        <a href="#">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#34A853" style="margin-right:5px;vertical-align:-2px;">
            <path d="M17 8C8 10 5.9 16.17 3.82 19.74L5.71 21l1-2.3A4.49 4.49 0 0 0 8 19c6 0 10-7 10-7s-1 5-7 5c-.8 0-1.47-.07-2.1-.2l-1.5 3.47L9 21.5c-.41.13-.82.25-1.26.33C9.11 23.2 10.56 24 12 24c5.52 0 10-4.48 10-10 0-4.28-2.7-7.94-6.5-9.44L17 8z"/>
          </svg>
          Il nostro terzo decennio di azione per il clima
        </a>
      </div>
      <div class="footer-right">
        <a href="#">Privacy</a>
        <a href="#">Termini</a>
        <a href="#">Impostazioni</a>
      </div>
    </div>
  </footer>

  <script src="js/profiles.js"></script>
  <script src="js/nomi.js"></script>
  <script src="js/templates.js"></script>
  <script>
    const form       = document.getElementById('search-form');
    const input      = document.getElementById('search-input');
    const photoInput = document.getElementById('photo-input');
    const strip      = document.getElementById('photo-strip');
    const thumb      = document.getElementById('photo-thumb');
    const photoName  = document.getElementById('photo-name');
    const removeBtn  = document.getElementById('remove-photo');

    // Ripristina foto salvata
    const saved = localStorage.getItem('foogle_photo');
    if (saved) {
      thumb.src = saved;
      photoName.textContent = localStorage.getItem('foogle_photo_name') || 'foto caricata';
      strip.classList.add('visible');
    }

    // Upload foto
    photoInput.addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        localStorage.setItem('foogle_photo', e.target.result);
        localStorage.setItem('foogle_photo_name', file.name);
        thumb.src = e.target.result;
        photoName.textContent = file.name;
        strip.classList.add('visible');
      };
      reader.readAsDataURL(file);
    });

    // Rimuovi foto
    removeBtn.addEventListener('click', function () {
      localStorage.removeItem('foogle_photo');
      localStorage.removeItem('foogle_photo_name');
      strip.classList.remove('visible');
      thumb.src = '';
      photoInput.value = '';
    });

    // Ricerca
    function doSearch() {
      const q = input.value.trim();
      if (!q) { input.focus(); return; }
      localStorage.removeItem('foogle_results');
      localStorage.removeItem('foogle_results_q');
      window.location.href = 'results.html?q=' + encodeURIComponent(q);
    }

    form.addEventListener('submit', e => { e.preventDefault(); doSearch(); });

    // Mi sento fortunato
    document.getElementById('btn-lucky').addEventListener('click', function () {
      const q = input.value.trim();
      if (!q) { input.focus(); return; }
      const results = getRandomResults(q);
      localStorage.setItem('foogle_results', JSON.stringify(results));
      localStorage.setItem('foogle_results_q', q);
      window.location.href = 'page.html?t=' + results[0].id + '&q=' + encodeURIComponent(q);
    });
  </script>
</body>
</html>
