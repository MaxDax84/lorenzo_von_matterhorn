<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Foogle</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body id="body-theme">

  <!-- HEADER SITO FAKE (colore dipende dal tema) -->
  <header class="site-header" id="site-header">
    <span class="site-logo" id="site-logo">—</span>
    <nav class="site-nav" id="site-nav"></nav>
  </header>

  <div class="article-page">
    <button class="article-back" id="back-btn" onclick="history.back()">
      ← Torna ai risultati
    </button>

    <div id="article-meta" class="article-meta"></div>
    <h1 id="article-title" class="article-title"></h1>
    <p id="article-subtitle" class="article-subtitle"></p>

    <div id="photo-wrap" class="article-photo-wrap" style="display:none;">
      <img id="article-photo" src="" alt="Foto" />
      <p class="article-photo-caption" id="photo-caption"></p>
    </div>

    <hr class="article-divider" />

    <div id="article-body" class="article-body"></div>
  </div>

  <script src="js/templates.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const tId = parseInt(params.get('t'), 10);
    const q = params.get('q') || '';

    // Trova il template
    const template = TEMPLATES.find(t => t.id === tId);
    if (!template) {
      document.body.innerHTML = '<p style="padding:40px;font-size:18px;">Pagina non trovata. <a href="index.html">Torna a Foogle</a></p>';
      throw new Error('Template non trovato');
    }

    const nome = decodeURIComponent(q);

    // Applica tema al body
    document.getElementById('body-theme').className = 'theme-' + template.tema;

    // Logo e nav del sito fake
    const logoMap = {
      forbes: 'Forbes',
      sole24ore: 'Il Sole 24 Ore',
      bloomberg: 'Bloomberg',
      natgeo: 'National Geographic',
      guinness: 'Guinness World Records',
      corriere: 'Corriere della Sera',
      gamberorosso: 'Gambero Rosso',
      medico: 'Chirurgia Estetica Internazionale',
      universita: 'Università di Bologna',
      oms: 'OMS',
    };

    const navMap = {
      forbes: ['Classifiche', 'Business', 'Lifestyle', 'Tech'],
      sole24ore: ['Economia', 'Finanza', 'Mondo', 'Plus'],
      bloomberg: ['Markets', 'Technology', 'Politics', 'Opinion'],
      natgeo: ['Scienza', 'Natura', 'Esplorazione', 'Foto'],
      guinness: ['Record', 'News', 'Hall of Fame', 'Candidati'],
      corriere: ['Italia', 'Mondo', 'Economia', 'Sport'],
      gamberorosso: ['Ristoranti', 'Vini', 'Ricette', 'Chef'],
      medico: ['Chirurgia', 'Casi Clinici', 'Specialisti', 'Contatti'],
      universita: ['Ricerca', 'Pubblicazioni', 'Medicina', 'Dottorati'],
      oms: ['Salute Globale', 'Notizie', 'Dati', 'Programmi'],
    };

    const metaMap = {
      forbes: 'Forbes Italia — Economia & Lifestyle',
      sole24ore: 'Il Sole 24 Ore — Finanza & Mercati',
      bloomberg: 'Bloomberg — Mercati Globali',
      natgeo: 'National Geographic — Esplorazione & Scienza',
      guinness: 'Guinness World Records — Record Ufficiali',
      corriere: 'Corriere della Sera — Notizie',
      gamberorosso: 'Gambero Rosso — Enogastronomia',
      medico: 'Chirurgia Estetica Internazionale — Bollettino Ufficiale',
      universita: 'Università di Bologna — Ricerca Medica',
      oms: 'OMS — Organizzazione Mondiale della Sanità',
    };

    document.getElementById('site-logo').textContent = logoMap[template.tema] || template.sito;
    document.getElementById('site-nav').innerHTML = (navMap[template.tema] || [])
      .map(v => `<span>${v}</span>`).join('');
    document.getElementById('article-meta').textContent = metaMap[template.tema] || template.sito;

    // Titolo pagina browser
    document.getElementById('page-title').textContent =
      applyNome(template.articolo.titolo, nome) + ' — ' + (logoMap[template.tema] || template.sito);

    // Contenuto articolo
    document.getElementById('article-title').textContent = applyNome(template.articolo.titolo, nome);
    document.getElementById('article-subtitle').textContent = applyNome(template.articolo.sottotitolo, nome);
    document.getElementById('article-body').innerHTML = applyNome(template.articolo.testo, nome);

    // Foto (se presente in localStorage)
    const savedPhoto = localStorage.getItem('foogle_photo');
    if (savedPhoto) {
      const photoWrap = document.getElementById('photo-wrap');
      const photoImg = document.getElementById('article-photo');
      const caption = document.getElementById('photo-caption');
      photoImg.src = savedPhoto;
      caption.textContent = nome + ' — foto ufficiale';
      photoWrap.style.display = 'block';
    }
  </script>
</body>
</html>
